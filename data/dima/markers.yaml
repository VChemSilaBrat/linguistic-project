version: markers_v0_1
language: ru
task: math_span_detection

defaults:
  lowercase: true
  replace_yo_with_e: true
  match_phrases_before_words: true
  position_scale:
    min: 0
    max: 3
  negative_scale:
    min: 0
    max: 3

enums:
  roles:
    - VARIABLE
    - CONSTANT
    - RELATION
    - OPERATOR
    - STRUCTURE
    - OBJECT
    - QUANTIFIER
    - CONNECTIVE
    - DISCOURSE_START
    - BOUNDARY
    - BOUNDARY_AMBIGUOUS
    - NEGATIVE_CONTEXT
    - END_CONTEXT
  match_types:
    - exact
    - phrase
    - lemma
    - regex
  confidences:
    - low
    - medium
    - high

entries:
  - id: discourse_let
    patterns:
      - "пусть"
    role: DISCOURSE_START
    match_type: phrase
    position: {start: 3, inside: 0, end: 0}
    domains: [general_math]
    confidence: high
    negative: 0
    notes: "Часто открывает математическое высказывание, но может быть обычным текстовым 'пусть теперь'."

  - id: discourse_consider
    patterns:
      - "рассмотрим"
      - "рассмотрим функцию"
      - "рассмотрим множество"
      - "рассмотрим матрицу"
    role: DISCOURSE_START
    match_type: phrase
    position: {start: 3, inside: 0, end: 0}
    domains: [general_math]
    confidence: high
    negative: 0
    notes: "Сильный стартовый маркер для лекционной математики."

  - id: discourse_denote
    patterns:
      - "обозначим"
      - "обозначим через"
      - "будем обозначать"
    role: DISCOURSE_START
    match_type: phrase
    position: {start: 3, inside: 1, end: 0}
    domains: [general_math]
    confidence: high
    negative: 0
    notes: "Вводит обозначение; после него часто идет переменная или объект."

  - id: discourse_get
    patterns:
      - "получаем"
      - "получим"
      - "получается"
    role: DISCOURSE_START
    match_type: phrase
    position: {start: 3, inside: 0, end: 1}
    domains: [general_math]
    confidence: high
    negative: 0
    notes: "Часто вводит итоговую формулу или отношение."

  - id: discourse_prove
    patterns:
      - "докажем"
      - "покажем"
      - "требуется доказать"
      - "нужно доказать"
      - "надо доказать"
    role: DISCOURSE_START
    match_type: phrase
    position: {start: 2, inside: 0, end: 1}
    domains: [general_math, logic]
    confidence: medium
    negative: 0
    notes: "Открывает доказательное рассуждение; не всегда сразу открывает формулу."

  - id: discourse_proof_context
    patterns:
      - "доказательство"
      - "предположим противное"
      - "от противного"
      - "по индукции"
      - "шаг индукции"
      - "индукционное предположение"
      - "по определению"
      - "по теореме"
      - "по лемме"
      - "по условию"
      - "из условия"
      - "из определения"
      - "из теоремы"
      - "из леммы"
    role: DISCOURSE_START
    match_type: phrase
    position: {start: 2, inside: 1, end: 1}
    domains: [general_math, logic]
    confidence: medium
    negative: 0
    notes: "Доказательные маркеры из suppl.yaml; часто задают контекст для следующего утверждения или формулы."

  - id: discourse_assume
    patterns:
      - "предположим"
      - "допустим"
      - "зафиксируем"
      - "возьмем"
      - "выберем"
      - "будем считать"
    role: DISCOURSE_START
    match_type: phrase
    position: {start: 2, inside: 0, end: 0}
    domains: [general_math]
    confidence: medium
    negative: 0
    notes: "Часто вводит объект или условие, но требует соседних математических маркеров."

  - id: discourse_therefore
    patterns:
      - "следовательно"
      - "значит"
      - "отсюда"
      - "откуда"
      - "таким образом"
    role: DISCOURSE_START
    match_type: phrase
    position: {start: 2, inside: 0, end: 1}
    domains: [general_math, logic]
    confidence: medium
    negative: 0
    notes: "Может закрывать предыдущий фрагмент и начинать новый вывод."

  - id: discourse_substitute
    patterns:
      - "подставим"
      - "заменим"
      - "раскроем скобки"
      - "приведем подобные"
      - "перенесем"
      - "сократим"
      - "упростим"
      - "домножим"
      - "поделим"
      - "умножим"
      - "прибавим"
      - "вычтем"
      - "разложим"
      - "сгруппируем"
      - "нормируем"
      - "ортогонализуем"
      - "диагонализуем"
    role: DISCOURSE_START
    match_type: phrase
    position: {start: 2, inside: 1, end: 0}
    domains: [general_math]
    confidence: medium
    negative: 0
    notes: "Операции преобразования выражений; полезны в вычислительных фрагментах."

  - id: discourse_compute_write
    patterns:
      - "вычислим"
      - "найдем"
      - "запишем"
      - "перепишем"
      - "посчитаем"
      - "выразим"
      - "проверим"
      - "можно записать"
      - "можно переписать"
      - "можно представить"
      - "требуется найти"
      - "нужно найти"
      - "надо найти"
    role: DISCOURSE_START
    match_type: phrase
    position: {start: 3, inside: 0, end: 0}
    domains: [general_math]
    confidence: high
    negative: 0
    notes: "Часто стоит прямо перед размеченным math-span в dataset_clean.csv."

  - id: discourse_given_show
    patterns:
      - "дано что"
      - "дано"
      - "дана"
      - "дан"
      - "задано"
      - "известно что"
      - "показать что"
      - "покажем что"
      - "заметим что"
      - "следует что"
      - "имеем"
      - "имеется"
      - "будет равно"
      - "в результате"
      - "получится"
    role: DISCOURSE_START
    match_type: phrase
    position: {start: 2, inside: 0, end: 1}
    domains: [general_math, logic]
    confidence: medium
    negative: 0
    notes: "Повторяющиеся вводные конструкции перед формулами и утверждениями в датасете."

  - id: discourse_define_assign
    patterns:
      - "введем обозначение"
      - "введем"
      - "зададим"
      - "определим"
      - "положим"
    role: DISCOURSE_START
    match_type: phrase
    position: {start: 3, inside: 0, end: 0}
    domains: [general_math]
    confidence: high
    negative: 0
    notes: "Сильные маркеры ввода объекта, обозначения или определения из suppl.yaml."

  - id: boundary_where
    patterns:
      - "где"
    role: BOUNDARY_AMBIGUOUS
    match_type: exact
    position: {start: 1, inside: 0, end: 1}
    domains: [general_math]
    confidence: medium
    negative: 0
    notes: "Может отделять формулу от пояснения или начинать пояснение переменных."

  - id: boundary_that_is
    patterns:
      - "то есть"
      - "иначе говоря"
    role: BOUNDARY_AMBIGUOUS
    match_type: phrase
    position: {start: 1, inside: 0, end: 1}
    domains: [general_math]
    confidence: medium
    negative: 0
    notes: "Переформулировка: иногда продолжает math-span, иногда возвращает в обычный текст."

  - id: boundary_condition_if
    patterns:
      - "если"
      - "то"
      - "тогда"
      - "при условии что"
      - "в случае если"
      - "когда"
    role: BOUNDARY_AMBIGUOUS
    match_type: phrase
    position: {start: 1, inside: 0, end: 1}
    domains: [general_math, logic]
    confidence: low
    negative: 0
    notes: "Сильная зависимость от контекста: может быть обычной речью или частью теоремы/условия."

  - id: boundary_explanation
    patterns:
      - "при этом"
      - "причем"
      - "здесь"
      - "в этом случае"
      - "а именно"
      - "далее"
      - "теперь"
      - "после этого"
      - "в таком случае"
      - "для этого"
      - "с другой стороны"
      - "с одной стороны"
    role: BOUNDARY_AMBIGUOUS
    match_type: phrase
    position: {start: 1, inside: 0, end: 1}
    domains: [general_math]
    confidence: medium
    negative: 0
    notes: "Часто вводит поясняющий кусок после формулы или условия."

  - id: end_proof
    patterns:
      - "что и требовалось доказать"
      - "чтд"
      - "доказано"
      - "получили ответ"
      - "это и есть ответ"
      - "на этом доказательство закончено"
      - "на этом закончим"
      - "закончили"
      - "готово"
      - "противоречие"
      - "получили противоречие"
    role: END_CONTEXT
    match_type: phrase
    position: {start: 0, inside: 0, end: 3}
    domains: [general_math, logic]
    confidence: high
    negative: 1
    notes: "Маркер конца доказательного блока, не формула сам по себе."

  - id: relation_equal
    patterns:
      - "равно"
      - "равен"
      - "равна"
      - "равны"
      - "равняется"
      - "равняться"
      - "знак равно"
      - "тождественно равно"
    role: RELATION
    match_type: phrase
    position: {start: 0, inside: 3, end: 0}
    domains: [general_math]
    confidence: high
    negative: 0
    notes: "Сильный inside-маркер. Сам по себе редко начинает span."

  - id: relation_not_equal
    patterns:
      - "не равно"
      - "не равен"
      - "не равна"
      - "не равны"
      - "не равняется"
    role: RELATION
    match_type: phrase
    position: {start: 0, inside: 3, end: 0}
    domains: [general_math]
    confidence: high
    negative: 0
    notes: "Сильное отношение внутри формульного выражения."

  - id: relation_compare
    patterns:
      - "больше"
      - "меньше"
      - "больше либо равно"
      - "меньше либо равно"
      - "больше или равно"
      - "меньше или равно"
      - "строго больше"
      - "строго меньше"
      - "отличен от"
      - "отлична от"
      - "отличные от"
      - "отличается от"
    role: RELATION
    match_type: phrase
    position: {start: 0, inside: 3, end: 0}
    domains: [general_math, order_theory]
    confidence: high
    negative: 0
    notes: "Фразы сравнения; многословные варианты должны матчиться раньше одиночных слов."

  - id: relation_membership
    patterns:
      - "принадлежит"
      - "принадлежат"
      - "не принадлежит"
      - "не принадлежит множеству"
      - "лежит в"
      - "из множества"
      - "является элементом"
      - "принадлежит множеству"
      - "принадлежат множеству"
    role: RELATION
    match_type: phrase
    position: {start: 0, inside: 3, end: 0}
    domains: [set_theory, general_math]
    confidence: high
    negative: 0
    notes: "Сильный маркер отношения элемента и множества."

  - id: relation_subset
    patterns:
      - "подмножество"
      - "является подмножеством"
      - "является надмножеством"
      - "содержится в"
      - "включается в"
      - "содержит"
    role: RELATION
    match_type: phrase
    position: {start: 0, inside: 3, end: 0}
    domains: [set_theory, general_math]
    confidence: high
    negative: 0
    notes: "Отношение между множествами."

  - id: relation_tends_to
    patterns:
      - "стремится к"
      - "стремится"
      - "стремящемся к"
      - "стремящейся к"
      - "при икс стремящемся к"
      - "при стремлении"
      - "устремляется к"
      - "устремляю"
    role: RELATION
    match_type: phrase
    position: {start: 0, inside: 3, end: 0}
    domains: [calculus, general_math]
    confidence: high
    negative: 0
    notes: "Типичный маркер предела."

  - id: relation_approx
    patterns:
      - "приблизительно равно"
      - "примерно равно"
      - "асимптотически равно"
      - "эквивалентно"
      - "эквивалентен"
      - "эквивалентна"
      - "пропорционально"
    role: RELATION
    match_type: phrase
    position: {start: 0, inside: 3, end: 0}
    domains: [general_math, asymptotic_analysis]
    confidence: high
    negative: 0
    notes: "Отношения приближения и эквивалентности."

  - id: relation_divisibility
    patterns:
      - "делится на"
      - "кратно"
      - "сравнимо по модулю"
      - "по модулю"
      - "конгруэнтно"
    role: RELATION
    match_type: phrase
    position: {start: 0, inside: 3, end: 0}
    domains: [number_theory, algebra]
    confidence: high
    negative: 0
    notes: "Числовые отношения и сравнения по модулю."

  - id: relation_defined_as
    patterns:
      - "по определению равно"
      - "определяется как"
      - "задается формулой"
      - "имеет вид"
      - "выражается через"
      - "представляет собой"
    role: RELATION
    match_type: phrase
    position: {start: 1, inside: 2, end: 0}
    domains: [general_math]
    confidence: high
    negative: 0
    notes: "Часто соединяет объект и формульное определение."

  - id: relation_transform_result
    patterns:
      - "совпадает с"
      - "не совпадает с"
      - "сводится к"
      - "распадается в"
      - "раскладывается в"
      - "дает нам"
      - "задает"
      - "задают"
      - "вытекает из"
    role: RELATION
    match_type: phrase
    position: {start: 1, inside: 2, end: 1}
    domains: [general_math]
    confidence: medium
    negative: 0
    notes: "Связки между обычным текстом и формульным выражением, часто вокруг MATH-тегов в датасете."

  - id: relation_geometric_algebraic
    patterns:
      - "по отношению к"
      - "ортогонален"
      - "ортогональна"
      - "ортогонально"
      - "параллелен"
      - "параллельна"
      - "коллинеарен"
    role: RELATION
    match_type: phrase
    position: {start: 0, inside: 3, end: 0}
    domains: [geometry, linear_algebra]
    confidence: medium
    negative: 0
    notes: "Отношения в геометрии и линейной алгебре; часть форм может быть текстовой без соседних объектов."

  - id: connective_logic_strong
    patterns:
      - "если и только если"
      - "тогда и только тогда"
      - "необходимо и достаточно"
      - "из этого следует"
      - "следует из"
      - "эквивалентно тому что"
      - "верно что"
      - "истинно что"
      - "ложно что"
    role: CONNECTIVE
    match_type: phrase
    position: {start: 1, inside: 2, end: 1}
    domains: [logic, general_math]
    confidence: high
    negative: 0
    notes: "Логические связки внутри утверждений и доказательств."

  - id: connective_logic_weak
    patterns:
      - "и"
      - "или"
      - "не"
      - "либо"
    role: CONNECTIVE
    match_type: exact
    position: {start: 0, inside: 1, end: 0}
    domains: [logic, general_math]
    confidence: low
    negative: 0
    notes: "Очень частые слова; учитывать только при уже активном математическом контексте."

  - id: operator_arithmetic_add_subtract
    patterns:
      - "плюс"
      - "минус"
      - "знак плюс"
      - "знак минус"
      - "сложить"
      - "вычесть"
      - "прибавить"
      - "отнять"
    role: OPERATOR
    match_type: phrase
    position: {start: 0, inside: 3, end: 0}
    domains: [general_math, arithmetic]
    confidence: high
    negative: 0
    notes: "Короткие внутренние маркеры арифметического выражения."

  - id: operator_arithmetic_multiply_divide
    patterns:
      - "умножить на"
      - "умноженное на"
      - "умноженного на"
      - "произведение"
      - "произведения"
      - "произведению"
      - "делить на"
      - "деленное на"
      - "деленного на"
      - "деленной на"
      - "поделить на"
      - "частное"
    role: OPERATOR
    match_type: phrase
    position: {start: 0, inside: 3, end: 0}
    domains: [general_math, arithmetic]
    confidence: high
    negative: 0
    notes: "Арифметические операции внутри формульной речи."

  - id: operator_min_max
    patterns:
      - "минимум"
      - "максимум"
      - "инфимум"
      - "супремум"
      - "аргумент минимума"
      - "аргумент максимума"
    role: OPERATOR
    match_type: phrase
    position: {start: 1, inside: 3, end: 0}
    domains: [analysis, optimization, general_math]
    confidence: high
    negative: 0
    notes: "Операторы экстремума и оптимизации."

  - id: operator_trig
    patterns:
      - "синус"
      - "синуса"
      - "sin"
      - "косинус"
      - "косинуса"
      - "cos"
      - "тангенс"
      - "тангенса"
      - "котангенс"
      - "котангенса"
      - "арксинус"
      - "арккосинус"
      - "арктангенс"
    role: OPERATOR
    match_type: exact
    position: {start: 1, inside: 3, end: 0}
    domains: [calculus, trigonometry]
    confidence: high
    negative: 0
    notes: "Имена функций; часто продолжаются аргументом."

  - id: operator_log_exp
    patterns:
      - "логарифм"
      - "логарифма"
      - "лагарифм"
      - "лагарифма"
      - "логарифм от"
      - "логарифм по основанию"
      - "логарифма по основанию"
      - "натуральный логарифм"
      - "десятичный логарифм"
      - "экспонента"
      - "экспоненты"
      - "экспонента от"
      - "экспоненциальная функция"
      - "сигмоида"
      - "софтмакс"
      - "индикатор"
      - "характеристическая функция"
    role: OPERATOR
    match_type: phrase
    position: {start: 1, inside: 3, end: 0}
    domains: [calculus, general_math]
    confidence: high
    negative: 0
    notes: "Функции и операторы, обычно внутри выражения."

  - id: operator_integral
    patterns:
      - "интеграл"
      - "интеграла"
      - "интегралом"
      - "integral"
      - "интеграл от"
      - "двойной интеграл"
      - "кратный интеграл"
    role: OPERATOR
    match_type: phrase
    position: {start: 1, inside: 3, end: 0}
    domains: [calculus]
    confidence: high
    negative: 0
    notes: "Оператор может начинать фрагмент, но особенно силен внутри выражения."

  - id: operator_derivative
    patterns:
      - "производная"
      - "производную"
      - "производной"
      - "первая производная"
      - "вторая производная"
      - "частная производная"
      - "производная по"
      - "производная по икс"
      - "первообразная"
      - "дифференцируем"
      - "продифференцируем"
      - "интегрируем"
      - "проинтегрируем"
      - "разложение тейлора"
      - "ряд тейлора"
      - "остаточный член"
      - "асимптотика"
      - "о малое"
      - "о большое"
    role: OPERATOR
    match_type: phrase
    position: {start: 1, inside: 3, end: 0}
    domains: [calculus]
    confidence: high
    negative: 0
    notes: "Оператор или объект вычисления, обычно рядом с переменными и отношениями."

  - id: operator_limit
    patterns:
      - "предел"
      - "предел при"
      - "предел при икс стремящемся к"
      - "предел от"
      - "лимит"
    role: OPERATOR
    match_type: phrase
    position: {start: 1, inside: 3, end: 0}
    domains: [calculus]
